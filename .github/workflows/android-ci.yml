name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=2"

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: nexus-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
          gradle-home-cache-cleanup: true

      - name: Generate wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi

      - name: Run Android lint (debug)
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest test --stacktrace

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            nexus-android/**/build/reports/lint-results-*.html
            nexus-android/**/build/reports/lint-results-*.xml
          if-no-files-found: ignore

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            nexus-android/**/build/reports/tests/
            nexus-android/**/build/test-results/
          if-no-files-found: ignore

  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 30
    defaults:
      run:
        working-directory: nexus-android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 --distribution-type bin
          fi

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Assemble release APK (debug-signed)
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: nexus-apks
          path: |
            nexus-android/app/build/outputs/apk/debug/*.apk
            nexus-android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
